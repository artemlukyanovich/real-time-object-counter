video:
  source: 0  # Webcam by default (0=default camera, or path to video file)
  fps: null         # null = read from source; explicit value overrides it
  fallback_fps: 30  # used when fps is null and the source reports 0 or nothing
  frame_width: 1280
  frame_height: 720

detector:
  model: "models/yolov8n.pt"  # nano model for speed
  confidence_threshold: 0.5
  device: "cuda"  # or "cpu"
  # Filter detections to specific classes only. null = detect all classes.
  # Use COCO class names, e.g.: ["person"] or ["person", "car", "truck"]
  allowed_classes: ["person"]

tracker:
  # Tracking algorithm. Options: "bytetrack" | "botsort" | "botsort_reid"
  # Tracker YAML for Ultralytics is generated automatically at runtime in
  # .runtime/trackers/ — editing those files is not needed.
  # "botsort_reid" enables appearance-based Re-ID (more stable IDs across
  # occlusions at the cost of speed; ReID model auto-downloaded on first run).
  algorithm: "bytetrack"

  # --- Shared thresholds (all algorithms) ---

  # Minimum detection confidence to activate a new track.
  # Maps to: track_high_thresh, new_track_thresh
  track_activation_threshold: 0.5

  # Minimum confidence for second-stage (low-confidence) detection matching.
  # Maps to: track_low_thresh
  track_low_threshold: 0.1

  # IoU cost threshold for matching detections to existing tracks.
  # Higher value: a lower IoU is still accepted as a match → object keeps its
  # ID after passing behind an obstacle (e.g. a lamppost).
  # Lower value: only high-overlap detections are matched → brief occlusion
  # causes an ID switch and a new track is created.
  # Maps to: match_thresh
  matching_cost_threshold: 0.8

  # --- Lost track handling ---

  # How many frames to keep a lost track alive before discarding it.
  # null = auto-calculate from FPS: round(video.fps * auto_lost_track_buffer_seconds).
  # Maps to: track_buffer
  lost_track_buffer: null
  auto_lost_track_buffer_seconds: 3.0

  # --- BoT-SORT specific (used with algorithm: "botsort" or "botsort_reid") ---

  # Fuse detection confidence score into the IoU cost matrix.
  fuse_score: true

  # Global Motion Compensation method. Stabilises tracks when camera moves.
  # Options: "sparseOptFlow" | "orb" | "ecc" | "none"
  gmc_method: "sparseOptFlow"

  # --- ReID (used only with algorithm: "botsort_reid") ---

  # Re-ID model weights. Auto-downloaded by Ultralytics on first run.
  # Options: osnet_x0_25_market.pt | osnet_x0_5_market.pt | osnet_x1_0_market.pt
  #          osnet_x0_25_msmt17.pt | osnet_x1_0_msmt17.pt
  reid_weights: "osnet_x0_25_market.pt"

  # IoU threshold below which appearance features are used for Re-ID matching.
  proximity_threshold: 0.5

  # Cosine distance threshold for Re-ID appearance matching.
  appearance_threshold: 0.25

counter:
  enable: true
  count_zone: null  # Optional: polygon zone [[x1,y1],[x2,y2],...]

  # Optional: list of lines that trigger IN/OUT counts when an object crosses them.
  # "in"  = object moved from the LEFT side of the line to the RIGHT side
  #         (left/right defined by the direction from points[0] to points[1]).
  # "out" = opposite direction.
  # Example (vertical centre line on a 1280×720 frame):
  #   crossing_lines:
  #     - name: "Centre"
  #       points: [[640, 0], [640, 720]]
  crossing_lines: null

reid:
  # Enable CLIP-based Re-Identification pipeline (ObjectCropper → ObjectEmbedder →
  # ObjectMemory → ReIDManager). Assigns each object a persistent object_id that
  # survives tracker ID resets caused by occlusions and re-entries.
  # Requires: pip install open-clip-torch
  # Note: first run downloads ~350 MB of model weights (ViT-B-32).
  enabled: true

  # Path to the embeddings/ReID configuration file.
  embeddings_config: "configs/embeddings/default.yaml"

  # Run the embedding pipeline every N frames (1 = every frame).
  # At 30 FPS, update_interval: 3 means ~10 embedding passes/sec — enough for
  # stable re-id while reducing GPU/CPU load significantly.
  update_interval: 3

  # Minimum consecutive frames a brand-new track must be visible before it is
  # registered as a new object (counted in unique/active stats).
  # Tracks that match an existing object are assigned immediately regardless.
  # At 30 FPS: 1 = instant (disabled), 8 ≈ 0.25 s, 30 = 1 s.
  min_track_age: 1

output:
  save_video: false
  output_dir: "outputs"
  video_name: "output.mp4"
  fps: 30

display:
  show_detections: true
  show_tracking_ids: true
  show_counts: true
  font_size: 1.0

  # Show persistent object IDs (OBJ N) on bounding boxes when reid.enabled is true.
  # Box colour is keyed by object_id (stable across tracker resets) rather than track_id.
  # Label format: "#N class [tM]" where N = object_id and M = tracker track_id.
  show_object_ids: true

  # Show a small ReID statistics panel (unique / active object counts) when
  # reid.enabled is true.
  show_reid_stats: true
