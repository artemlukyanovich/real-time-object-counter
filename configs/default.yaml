video:
  source: 0  # Webcam by default (0=default camera, or path to video file)
  fps: null         # null = read from source; explicit value overrides it
  fallback_fps: 30  # used when fps is null and the source reports 0 or nothing
  frame_width: 1280
  frame_height: 720

detector:
  model: "yolov8n.pt"  # nano model for speed
  confidence_threshold: 0.5
  device: "cuda"  # or "cpu"

tracker:
  # Tracking algorithm. Options: "bytetrack" | "botsort" | "botsort_reid"
  # Each algorithm has its own template in configs/trackers/.
  # The parameters below are applied on top of the template at runtime,
  # overriding the corresponding fields in the selected template.
  # "botsort_reid" enables appearance-based Re-ID (more stable IDs across
  # occlusions at the cost of speed; ReID model auto-downloaded on first run).
  algorithm: "bytetrack"

  # Minimum detection confidence to activate a new track.
  # Applies to both ByteTrack and BoT-SORT.
  # Overrides track_high_thresh and new_track_thresh in the tracker template.
  track_activation_threshold: 0.25

  # How many frames to keep a lost track alive before discarding it.
  # Applies to both ByteTrack and BoT-SORT.
  # Overrides track_buffer in the tracker template.
  # null = auto-calculate from FPS: round(video.fps * auto_lost_track_buffer_seconds).
  lost_track_buffer: null
  auto_lost_track_buffer_seconds: 3.0

  # IoU threshold used when matching detections to existing tracks.
  # Applies to both ByteTrack and BoT-SORT.
  # Overrides match_thresh in the tracker template.
  minimum_matching_threshold: 0.8

counter:
  enable: true
  count_zone: null  # Optional: polygon zone [[x1,y1],[x2,y2],...]

  # Optional: list of lines that trigger IN/OUT counts when an object crosses them.
  # "in"  = object moved from the LEFT side of the line to the RIGHT side
  #         (left/right defined by the direction from points[0] to points[1]).
  # "out" = opposite direction.
  # Example (vertical centre line on a 1280×720 frame):
  #   crossing_lines:
  #     - name: "Centre"
  #       points: [[640, 0], [640, 720]]
  crossing_lines: null

output:
  save_video: false
  output_dir: "outputs"
  video_name: "output.mp4"
  fps: 30

display:
  show_detections: true
  show_tracking_ids: true
  show_counts: true
  font_size: 1.0
