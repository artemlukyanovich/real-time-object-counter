# BoT-SORT tracker configuration template — ReID variant.
# Identical to botsort.yaml but with appearance-based Re-ID enabled.
#
# Parameters marked with (*) are overridden at runtime by the corresponding
# fields in the [tracker] section of the active config:
#   track_activation_threshold → track_high_thresh, new_track_thresh  (*)
#   lost_track_buffer          → track_buffer                          (*)
#   minimum_matching_threshold → match_thresh                          (*)
#
# ReID model (reid_weights) is downloaded automatically by Ultralytics on
# first use.  osnet_x0_25_market.pt is a lightweight OSNet model trained on
# Market-1501; it balances accuracy and speed well for most use cases.
# To disable ReID at runtime, switch tracker.algorithm back to "botsort".

tracker_type: botsort

# Confidence threshold for high-quality detections (first matching stage). (*)
track_high_thresh: 0.5

# Confidence threshold for low-quality detections (second matching stage).
track_low_thresh: 0.1

# Minimum confidence required to initialise a new track. (*)
new_track_thresh: 0.5

# Frames to keep a lost track alive before discarding it. (*)
track_buffer: 30

# IoU threshold for matching detections to existing tracks. (*)
match_thresh: 0.8

# Fuse detection confidence score into the IoU cost matrix.
fuse_score: true

# --- Global Motion Compensation (GMC) ---
# Method used to estimate and compensate for camera motion between frames.
# Options: sparseOptFlow (fast, recommended) | orb | ecc | none
gmc_method: sparseOptFlow

# --- Appearance-based Re-ID ---
# IoU threshold below which appearance features are used for matching.
proximity_thresh: 0.5

# Cosine distance threshold for appearance feature matching.
# Lower value → stricter appearance match required.
appearance_thresh: 0.25

# Enable Re-ID model for appearance-based matching.
with_reid: true

# Re-ID model weights.  Auto-downloaded by Ultralytics on first run.
# Lightweight OSNet variant — good balance of accuracy and speed.
reid_weights: osnet_x0_25_market.pt
#reid_weights: osnet_x1_0_msmt17.pt
