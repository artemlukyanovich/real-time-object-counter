video:
  source: 0  # Webcam by default (0=default camera, or path to video file)
  fps: null         # null = read from source; explicit value overrides it
  fallback_fps: 30  # used when fps is null and the source reports 0 or nothing
  frame_width: 1280
  frame_height: 720
  async_pipeline: true   # defaults to true; false = synchronous read
  drop_policy: "auto"    # auto | block | drop (live=drop, file=block); defaults to "auto"
#  frame_width: 960
#  frame_height: 540
#  frame_width: 640
#  frame_height: 360

detector:
#  model: "models/yolov8n.pt"  # nano model for speed
  model: "models/yolov8m.pt"  # small model for accuracy
#  model: "custom_models/final/custom_final_1/weights/best.pt"  # компромисс: скорость/точность
  confidence_threshold: 0.5
  device: "cuda"  # or "cpu"
#  allowed_classes: ["person", "taar", "arx", "the_institute"]  # Use COCO class names, e.g.: ["person"] or ["person", "car", "truck"]
  allowed_classes: null  # Use COCO class names, e.g.: ["person"] or ["person", "car", "truck"]
  half: true  # defaults to false
  detect_interval: 2  # defaults to 1

tracker:
  # Tracking algorithm. Options: "bytetrack" | "botsort" | "botsort_reid"
  algorithm: "bytetrack"
  track_activation_threshold: 0.75
  lost_track_buffer: null
  auto_lost_track_buffer_seconds: 3.0
  matching_cost_threshold: 0.85

counter:
  enable: true
  count_zone: null  # Optional: polygon zone [[x1,y1],[x2,y2],...]
  crossing_lines: null  # Optional: see default.yaml for format
#  crossing_lines:
#    - name: "Centre"
#      points: [ [ 640, 0 ], [ 640, 720 ] ]

output:
  save_video: false
  output_dir: "outputs"
  video_name: "output.mp4"
  fps: 30

display:
  show_detections: true
  show_tracking_ids: true
  show_counts: true
  font_size: 1
