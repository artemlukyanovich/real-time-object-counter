video:
  source: 0  # Webcam by default (0=default camera, or path to video file)
  fps: 30
  frame_width: 1280
  frame_height: 720

detector:
  model: "yolov8n.pt"  # nano model for speed
  confidence_threshold: 0.5
  device: "cuda"  # or "cpu"

tracker:
  algorithm: "bytetrack"
  track_activation_threshold: 0.5
  lost_track_buffer: 90   # ~3 s at 30 fps — good for slow/intermittent objects
  minimum_matching_threshold: 0.95

counter:
  enable: true
  count_zone: null  # Optional: polygon zone [[x1,y1],[x2,y2],...]
  crossing_lines: null  # Optional: see default.yaml for format
#  crossing_lines:
#    - name: "Centre"
#      points: [ [ 640, 0 ], [ 640, 720 ] ]

output:
  save_video: false
  output_dir: "outputs"
  video_name: "output.mp4"
  fps: 30

display:
  show_detections: true
  show_tracking_ids: true
  show_counts: true
  font_size: 1.0
